<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <circle cx="48" cy="48" r="46" fill="#b01c1c"/>
  <!-- Robot/AI head outline -->
  <rect x="26" y="30" width="44" height="36" rx="6" fill="none" stroke="white" stroke-width="4"/>
  <!-- Eyes -->
  <circle cx="37" cy="45" r="5" fill="white"/>
  <circle cx="59" cy="45" r="5" fill="white"/>
