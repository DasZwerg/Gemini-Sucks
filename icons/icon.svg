  <line x1="36" y1="57" x2="60" y2="57" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="48" y1="30" x2="48" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <circle cx="48" cy="17" r="3" fill="white"/>
  <!-- Big red X slash across the whole thing -->
  <line x1="15" y1="15" x2="81" y2="81" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <line x1="81" y1="15" x2="15" y2="81" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
